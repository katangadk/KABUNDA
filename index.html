<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kabunda Katanga — Cybersecurity Student at ZamCoT. CTF competitor, cryptography enthusiast, digital defender.">
<title>Kabunda Katanga | Cybersecurity Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style> 
  :root {
    --blue: #1a4a7a;
    --blue-mid: #2563a8;
    --blue-light: #4e9bd4;
    --blue-glow: rgba(37,99,168,0.15);
    --grey-dark: #111520;
    --grey-mid: #181d2b;
    --grey-card: #1c2234;
    --grey-border: #252d45;
    --text-primary: #e8edf5;
    --text-muted: #7a87a3;
    --text-accent: #4e9bd4;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --transition: 0.22s ease;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:var(--sans); background:var(--grey-dark); color:var(--text-primary); overflow-x:hidden; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--grey-dark); }
  ::-webkit-scrollbar-thumb { background:var(--blue-mid); border-radius:4px; }
  
  /* ─── NAV ─── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 4rem;
    background:rgba(17,21,32,0.9);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--grey-border);
    transition:padding var(--transition);
  }
  .nav-logo {
    font-family:var(--mono);
    font-size:1rem;
    color:var(--blue-light);
    letter-spacing:3px;
    display:flex; align-items:center; gap:0.5rem;
  }
  .nav-logo-dot { width:8px; height:8px; border-radius:50%; background:var(--blue-light); animation:pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .nav-links { display:flex; gap:2.2rem; list-style:none; align-items:center; }
  .nav-links a {
    font-size:0.78rem; font-weight:600; letter-spacing:1.8px;
    text-transform:uppercase; color:var(--text-muted);
    text-decoration:none; transition:color var(--transition); position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-4px; left:0; right:0;
    height:1px; background:var(--blue-light); transform:scaleX(0); transition:transform var(--transition);
  }
  .nav-links a:hover { color:var(--blue-light); }
  .nav-links a:hover::after { transform:scaleX(1); }
  .nav-cta {
    padding:0.5rem 1.2rem;
    background:rgba(37,99,168,0.2);
    border:1px solid rgba(78,155,212,0.4);
    border-radius:6px;
    color:var(--blue-light) !important;
  }
  .nav-cta:hover { background:rgba(37,99,168,0.4) !important; }
  .nav-cta::after { display:none !important; }
  
  /* ─── HERO ─── */
  #hero {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:8rem 2rem 5rem; position:relative; overflow:hidden;
  }
  .hero-canvas {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(37,99,168,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,168,0.04) 1px, transparent 1px);
    background-size:52px 52px;
  }
  .hero-inner { position:relative; z-index:1; max-width:780px; text-align:center; }
  h1 {
    font-size:clamp(2.4rem,6.5vw,4.2rem);
    font-weight:700; letter-spacing:-2px; line-height:1.05;
    margin-bottom:0.4rem;
  }
  .accent { color:var(--blue-light); }

  /* ─── FOOTER ─── */
  footer {
    border-top:1px solid var(--grey-border);
    padding:2.5rem 2rem;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;
  }
  .footer-logo { font-family:var(--mono); font-size:0.85rem; color:var(--blue-light); letter-spacing:2px; }
  .footer-copy { font-family:var(--mono); font-size:0.72rem; color:var(--text-muted); letter-spacing:1px; }

  @media(max-width:900px) {
    nav { padding:1rem 2rem; }
    .nav-links { gap:1rem; }
  }
</style>
</head>
<body>

<nav id="nav"> 
  <div class="nav-logo"> <div class="nav-logo-dot"></div> KK.SEC </div> 
  <ul class="nav-links"> 
    <li><a href="#about">About</a></li> 
    <li><a href="#platforms">Activity</a></li> 
    <li><a href="#skills">Skills</a></li> 
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact" class="nav-cta">Secure Line</a></li>
  </ul> 
</nav>

<section id="hero">
  <div class="hero-canvas"></div>
  <div class="hero-inner">
    <h1>Kabunda <span class="accent">Katanga</span></h1>
    <p class="hero-bio">Cybersecurity Student & Cryptography Enthusiast.</p>
  </div>
</section>

<footer>
  <div class="footer-logo">KK.SEC // 2026</div>
  <div class="footer-copy">&copy; 2026 Kabunda Katanga. All rights reserved.</div>
</footer>

</body>
</html>
